name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'              # Теги вида v1.0.0, v2.1.3 и т.д.
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.22'

jobs:
  # JOB 1: Тестирование (запускается всегда)
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    
    steps:
      # Загружаем код
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Устанавливаем Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      # Скачиваем зависимости
      - name: Download dependencies
        run: go mod download
      
      # Проверяем синтаксис и запускаем тесты
      - name: Run tests
        run: go test -v -race ./...

  # JOB 2: Публикация в DockerHub (только при создании тега)
  docker-publish:
    name: Publish to DockerHub
    needs: test              # Запускается только после успешного тестирования
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')  # Только для тегов
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Настраиваем Docker Buildx (для многоплатформенной сборки)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # Логинимся в DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      # Собираем и публикуем образ
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/final-main:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/final-main:${{ github.ref_name }}
