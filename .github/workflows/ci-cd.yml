name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.25.3'

jobs:
  # JOB 1: Тестирование (запускается всегда)
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: Download dependencies
        run: go mod download
      
      # Создаем базу данных и таблицу перед тестами
      - name: Setup database
        run: |
          sqlite3 tracker.db "CREATE TABLE IF NOT EXISTS parcel (
            number INTEGER PRIMARY KEY AUTOINCREMENT,
            client INTEGER NOT NULL,
            status TEXT NOT NULL,
            address TEXT NOT NULL,
            created_at TEXT NOT NULL
          );"
      
      - name: Run tests
        run: go test -v -race ./...
      
      - name: Build binary
        run: go build -v -o final-main .
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: final-main-binary
          path: final-main
          retention-days: 7

  # JOB 2: Публикация в DockerHub (только при создании тега)
  docker-publish:
    name: Publish to DockerHub
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/final-main:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/final-main:${{ github.ref_name }}
